<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow1" cx="70%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="nodeglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Animasyonlar -->
    <style>
      .pulse1 { animation: pulse 3s ease-in-out infinite; }
      .pulse2 { animation: pulse 4s ease-in-out infinite 1s; }
      .pulse3 { animation: pulse 5s ease-in-out infinite 2s; }
      .pulse4 { animation: pulse 3.5s ease-in-out infinite 0.5s; }
      .pulse5 { animation: pulse 4.5s ease-in-out infinite 1.5s; }
      .flow1  { animation: flow 4s linear infinite; }
      .flow2  { animation: flow 6s linear infinite 1s; }
      .flow3  { animation: flow 5s linear infinite 2s; }
      .flow4  { animation: flow 7s linear infinite 0.5s; }
      .flow5  { animation: flow 4.5s linear infinite 3s; }
      .flow6  { animation: flow 5.5s linear infinite 1.5s; }
      .scanmove { animation: scan 10s linear infinite; }
      @keyframes pulse {
        0%,100% { opacity: 0.5; r: 5; }
        50%      { opacity: 1;   r: 8; }
      }
      @keyframes flow {
        0%   { stroke-dashoffset: 300; opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { stroke-dashoffset: 0;   opacity: 0; }
      }
      @keyframes scan {
        0%   { transform: translateY(-20px); opacity:0; }
        5%   { opacity: 0.6; }
        95%  { opacity: 0.6; }
        100% { transform: translateY(920px); opacity:0; }
      }
    </style>
  </defs>

  <!-- Arka plan -->
  <rect width="1440" height="900" fill="#0A0E1A"/>

  <!-- Glow alanları -->
  <rect width="1440" height="900" fill="url(#glow1)"/>
  <rect width="1440" height="900" fill="url(#glow2)"/>

  <!-- Grid -->
  <g stroke="rgba(245,166,35,0.06)" stroke-width="1">
    <!-- Yatay çizgiler -->
    <line x1="0" y1="100" x2="1440" y2="100"/>
    <line x1="0" y1="200" x2="1440" y2="200"/>
    <line x1="0" y1="300" x2="1440" y2="300"/>
    <line x1="0" y1="400" x2="1440" y2="400"/>
    <line x1="0" y1="500" x2="1440" y2="500"/>
    <line x1="0" y1="600" x2="1440" y2="600"/>
    <line x1="0" y1="700" x2="1440" y2="700"/>
    <line x1="0" y1="800" x2="1440" y2="800"/>
    <!-- Dikey çizgiler -->
    <line x1="180" y1="0" x2="180" y2="900"/>
    <line x1="360" y1="0" x2="360" y2="900"/>
    <line x1="540" y1="0" x2="540" y2="900"/>
    <line x1="720" y1="0" x2="720" y2="900"/>
    <line x1="900" y1="0" x2="900" y2="900"/>
    <line x1="1080" y1="0" x2="1080" y2="900"/>
    <line x1="1260" y1="0" x2="1260" y2="900"/>
  </g>

  <!-- Devre kartı yolları (kalın turuncu çizgiler) -->
  <g stroke="rgba(245,166,35,0.18)" stroke-width="1.5" fill="none">
    <!-- Sol üst devre -->
    <polyline points="0,150 120,150 120,250 300,250 300,200 500,200"/>
    <polyline points="0,320 80,320 80,400 200,400 200,350 380,350 380,450 600,450"/>
    <polyline points="180,0 180,180 260,180 260,300 420,300"/>
    <!-- Sağ orta devre -->
    <polyline points="1440,280 1300,280 1300,180 1100,180 1100,250 950,250"/>
    <polyline points="1440,500 1360,500 1360,420 1200,420 1200,350 1020,350"/>
    <polyline points="1260,0 1260,120 1150,120 1150,220 980,220"/>
    <!-- Alt devre -->
    <polyline points="0,700 150,700 150,650 350,650 350,720 550,720"/>
    <polyline points="400,900 400,800 600,800 600,750 800,750"/>
    <polyline points="1440,750 1280,750 1280,680 1100,680 1100,730 900,730"/>
    <!-- Orta bağlantılar -->
    <polyline points="540,450 540,550 700,550 700,500 860,500"/>
    <polyline points="720,300 720,400 820,400 820,480 1000,480"/>
  </g>

  <!-- Devre kartı bağlantı noktaları (düğümler) -->
  <g filter="url(#nodeglow)">
    <!-- Ana düğümler - büyük -->
    <circle cx="300" cy="250" r="6" fill="#F5A623" opacity="0.9" class="pulse1"/>
    <circle cx="500" cy="200" r="5" fill="#F5A623" opacity="0.85" class="pulse2"/>
    <circle cx="200" cy="400" r="6" fill="#F5A623" opacity="0.9" class="pulse3"/>
    <circle cx="600" cy="450" r="5" fill="#F5A623" opacity="0.8" class="pulse4"/>
    <circle cx="1100" cy="180" r="6" fill="#F5A623" opacity="0.9" class="pulse2"/>
    <circle cx="950" cy="250" r="5" fill="#F5A623" opacity="0.85" class="pulse1"/>
    <circle cx="1200" cy="420" r="6" fill="#F5A623" opacity="0.9" class="pulse5"/>
    <circle cx="1020" cy="350" r="5" fill="#F5A623" opacity="0.8" class="pulse3"/>
    <circle cx="350" cy="650" r="6" fill="#F5A623" opacity="0.9" class="pulse4"/>
    <circle cx="550" cy="720" r="5" fill="#F5A623" opacity="0.85" class="pulse1"/>
    <circle cx="800" cy="750" r="6" fill="#F5A623" opacity="0.9" class="pulse2"/>
    <circle cx="900" cy="730" r="5" fill="#F5A623" opacity="0.8" class="pulse5"/>
    <circle cx="700" cy="550" r="6" fill="#F5A623" opacity="0.9" class="pulse3"/>
    <circle cx="860" cy="500" r="5" fill="#F5A623" opacity="0.85" class="pulse4"/>
    <!-- Küçük ara düğümler -->
    <circle cx="120" cy="250" r="3.5" fill="#F5A623" opacity="0.7" class="pulse2"/>
    <circle cx="80"  cy="400" r="3"   fill="#F5A623" opacity="0.65" class="pulse3"/>
    <circle cx="420" cy="300" r="3.5" fill="#F5A623" opacity="0.7" class="pulse1"/>
    <circle cx="380" cy="350" r="3"   fill="#F5A623" opacity="0.65" class="pulse4"/>
    <circle cx="1300" cy="280" r="3.5" fill="#F5A623" opacity="0.7" class="pulse5"/>
    <circle cx="1360" cy="500" r="3"   fill="#F5A623" opacity="0.65" class="pulse2"/>
    <circle cx="1280" cy="680" r="3.5" fill="#F5A623" opacity="0.7" class="pulse1"/>
    <circle cx="1100" cy="730" r="3"   fill="#F5A623" opacity="0.65" class="pulse3"/>
    <circle cx="540"  cy="550" r="3.5" fill="#F5A623" opacity="0.7" class="pulse4"/>
    <circle cx="820"  cy="480" r="3"   fill="#F5A623" opacity="0.65" class="pulse2"/>
    <circle cx="150"  cy="700" r="3.5" fill="#F5A623" opacity="0.7" class="pulse5"/>
    <circle cx="600"  cy="800" r="3"   fill="#F5A623" opacity="0.65" class="pulse1"/>
  </g>

  <!-- Kayan ışık parçacıkları (stroke-dasharray animasyonlu) -->
  <g stroke="#F5A623" stroke-width="2.5" fill="none" stroke-linecap="round">
    <line x1="0" y1="150" x2="500" y2="150" stroke-dasharray="60 300" class="flow1" opacity="0.8"/>
    <line x1="1440" y1="280" x2="950" y2="280" stroke-dasharray="50 300" class="flow2" opacity="0.75"/>
    <line x1="0" y1="700" x2="550" y2="700" stroke-dasharray="70 300" class="flow3" opacity="0.8"/>
    <line x1="1440" y1="750" x2="900" y2="750" stroke-dasharray="55 300" class="flow4" opacity="0.75"/>
    <line x1="180" y1="0" x2="180" y2="400" stroke-dasharray="60 300" class="flow5" opacity="0.8"/>
    <line x1="1260" y1="0" x2="1260" y2="350" stroke-dasharray="65 300" class="flow6" opacity="0.75"/>
  </g>

  <!-- Tarama çizgisi -->
  <rect x="0" y="0" width="1440" height="2" fill="rgba(245,166,35,0.25)" class="scanmove"/>

  <!-- İnce radyal ışık ortada -->
  <circle cx="1100" cy="150" r="220" fill="none" stroke="rgba(245,166,35,0.05)" stroke-width="1"/>
  <circle cx="1100" cy="150" r="150" fill="none" stroke="rgba(245,166,35,0.07)" stroke-width="1"/>
  <circle cx="1100" cy="150" r="80"  fill="none" stroke="rgba(245,166,35,0.10)" stroke-width="1"/>
</svg>
